<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-in Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="form-container">
      <header class="form-header">
        <a href="#"><img src="amazon-logo-removebg-preview.png" alt="" /></a>
      </header>
      <main class="form-main">
        <form action="#">
          <h1>Sign in or create account</h1>
          <p class="input-label">Enter mobile number or email</p>
          <input type="text" id="mobileOrEmail" />
          <button>Continue</button>
          <p class="terms-of-use">
            By using, you agree to Amazon's
            <a href="#">Conditions of Use</a> and
            <a href="#">Privacy Notice.</a>
          </p>
          <p class="need-help"><a href="#">Need help?</a></p>
          <hr />
          <span class="form-span one">Buying for work?</span>
          <span class="form-span two"><a href="#">Create a free business account</a></span>
        </form>
      </main>
      <footer class="form-footer">
        <a href="#">Conditions of Use</a>
        <a href="#">Privacy Notice</a>
        <a href="#">Help</a>
        <p class="footer-p">© 1996-2026, Amazon.com, Inc. or its affiliates</p>
      </footer>
    </div>
    <script src="main.js"></script>
  </body>
</html>
